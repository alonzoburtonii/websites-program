<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | Zo’s Exotic Elysium</title>
  <meta name="description" content="Contact Zo’s Exotic Elysium with general inquiries." />

  <link rel="stylesheet" href="/shared/base.css" />
  <link rel="stylesheet" href="/shared/components.css" />
  <link rel="stylesheet" href="/brand.css" />

  <script defer src="/shared/components.js"></script>
  <script defer src="/shared/motion.js"></script>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header">
  <div class="container">
    <div class="header-row">
      <a class="logo" href="/">Zo’s Exotic Elysium</a>
      <nav class="nav" aria-label="Primary">
        <a href="/membership/">Membership</a>
        <a href="/login/">Login</a>
        <a class="btn btn--primary" href="/apply/">Apply for Membership</a>
      </nav>
      <button class="menu-btn" type="button" data-menu-btn aria-expanded="false" aria-controls="mobile-nav">Menu</button>
    </div>
    <nav id="mobile-nav" class="mobile-nav" data-mobile-nav aria-label="Mobile">
      <a href="/membership/">Membership</a>
      <a href="/login/">Login</a>
      <a class="btn btn--primary" href="/apply/">Apply for Membership</a>
    </nav>
  </div>
</header>

<main id="main">
  <section class="hero section">
    <div class="container">
      <h1>Contact</h1>
      <p class="lead">Use this form for general inquiries.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <form class="form" name="zo-contact" method="POST" data-netlify="true">
        <input type="hidden" name="form-name" value="zo-contact" />

        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>

        <button class="btn btn--primary" type="submit">Send</button>
      </form>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container footer-row">
    <small class="small">© <span id="year"></span> Zo’s Exotic Elysium.</small>
    <div class="small">Private • Curated • Members Only</div>
  </div>
</footer>
<script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
