<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | Vine St Beatz</title>
  <meta name="description" content="Contact Vine St Beatz with questions about beats, licensing, or sessions." />

  <link rel="stylesheet" href="/shared/base.css" />
  <link rel="stylesheet" href="/shared/components.css" />
  <link rel="stylesheet" href="/brand.css" />
  <script defer src="/shared/components.js"></script>
  <script defer src="/shared/motion.js"></script>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header">
  <div class="container">
    <div class="header-row">
      <a class="logo" href="/">Vine St Beatz</a>
      <nav class="nav" aria-label="Primary">
        <a href="/beats/">Browse Beats</a>
        <a href="/book/">Book a Session</a>
      </nav>
      <button class="menu-btn" type="button" data-menu-btn aria-expanded="false" aria-controls="mobile-nav">Menu</button>
    </div>
    <nav id="mobile-nav" class="mobile-nav" data-mobile-nav aria-label="Mobile">
      <a href="/beats/">Browse Beats</a>
      <a href="/book/">Book a Session</a>
    </nav>
  </div>
</header>

<main id="main">
  <section class="hero section">
    <div class="container">
      <h1>Contact</h1>
      <p class="lead">Ask about beats, licensing, or sessions — we’ll respond with next steps.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <form class="form" name="vine-contact" method="POST" data-netlify="true">
        <input type="hidden" name="form-name" value="vine-contact" />

        <div class="field">
          <label for="name">Name / Artist Name</label>
          <input id="name" name="name" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" required placeholder="What can we help with?"></textarea>
        </div>

        <button class="btn btn--primary" type="submit">Send</button>
      </form>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container footer-row">
    <small class="small">© <span id="year"></span> Vine St Beatz.</small>
    <div class="small">Beats • Sessions • Collaboration</div>
  </div>
</footer>
<script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
